# git-cliff — generates CHANGELOG.md from the commit history.
# Author/refresh with `npm run changelog` (stamp a version with `-- --tag vX.Y.Z`).
[changelog]
header = """
# Changelog

All notable changes to Mitra are documented here.\n
"""
body = """
{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits -%}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }} ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/a11delavar/mitra/commit/{{ commit.id }}))
{% endfor -%}
{% endfor %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
commit_parsers = [
	{ message = "^release", skip = true },
	{ message = "^feat", group = "✨ Features" },
	{ message = "^fix", group = "🐛 Bug Fixes" },
	{ message = "^perf", group = "⚡ Performance" },
	{ message = "^refactor", group = "🧹 Refactors" },
	{ message = "^docs", group = "📝 Documentation" },
	{ message = "^test", group = "✅ Tests" },
	{ message = "^ci|^build|^infra", group = "🏗️ Infrastructure" },
	{ message = "^chore", group = "🔧 Chores" },
	{ message = ".*", group = "🔹 Other" },
]
filter_commits = false
tag_pattern = "v[0-9]*"
sort_commits = "newest"

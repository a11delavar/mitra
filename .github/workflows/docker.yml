name: Docker

# Builds and publishes the container image to GHCR.
#
# Tagging (handled entirely by docker/metadata-action, off the git ref):
#   • push to main         → `dev` (rolling) + `sha-<short>` (immutable per commit)
#   • push tag `vX.Y.Z`    → `X.Y.Z`, `X.Y`, `X`, and `latest`
#   • push tag `vX.Y.Z-rc.N` → only `X.Y.Z-rc.N` (no floating `X`/`X.Y`, no `latest`)
#   • pull request          → build only (no push), to validate the Dockerfile
# Pushing the tag is the single trigger — `release.yml` turns the same tag into a
# GitHub Release with commit-based notes, in parallel.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so `git describe` below can reach the nearest tag.
          fetch-depth: 0

      # The version string baked into the app (see scripts/esbuild.ts): the tag itself on tag builds,
      # `v0.3.0-14-ga1b2c3d` on main/PR builds — passed into the image as a build ARG since the
      # Docker context carries no .git to compute it from.
      - name: Compute version string
        id: version
        run: |
          echo "version=$(git describe --tags --always)" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Compute image tags & labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          # `latest=auto`: applied to stable semver tags, and automatically skipped
          # for pre-releases (e.g. v1.2.3-rc.1).
          flavor: latest=auto
          tags: |
            type=raw,value=dev,enable={{is_default_branch}}
            type=sha,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          # arm64 is emulated (QEMU), so only build it for real publishes; PRs stay fast.
          platforms: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MITRA_VERSION=${{ steps.version.outputs.version }}
            MITRA_COMMIT=${{ steps.version.outputs.commit }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
